<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UR Robot Dashboard</title>
    <script type="importmap">
    {
        "imports": {
            "three": "/lib/three/build/three.module.js",
            "three/": "/lib/three/",
            "urdf-loader": "/lib/urdf-loader/src/URDFLoader.js",
            "urdf-loader/": "/lib/urdf-loader/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: #16213e;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }
        header h1 { font-size: 20px; color: #e94560; }
        .connection-status {
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #ff4444;
        }
        .status-dot.connected { background: #44ff44; }
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
            height: calc(100vh - 52px);
            overflow: hidden;
        }
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #0f3460;
            flex-shrink: 0;
        }
        .card h2 {
            font-size: 13px; text-transform: uppercase; color: #e94560;
            margin-bottom: 8px; letter-spacing: 1px;
        }
        #viewer-card {
            flex: 1;
            min-height: 250px;
            position: relative;
            padding: 0;
            overflow: hidden;
            flex-shrink: 1;
        }
        #viewer-card h2 {
            position: absolute; top: 12px; left: 16px; z-index: 10;
        }
        #viewer-loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #888; font-size: 14px; z-index: 10;
        }
        #viewer3d {
            width: 100%; height: 100%; display: block;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        table th {
            text-align: left; padding: 6px 8px; color: #888;
            border-bottom: 1px solid #0f3460; font-weight: 500;
        }
        table th:nth-child(1) { width: 38%; }
        table th:nth-child(2) { width: 22%; }
        table th:nth-child(3) { width: 20%; }
        table th:nth-child(4) { width: 20%; }
        table td {
            padding: 6px 8px; border-bottom: 1px solid #0f346033;
            font-family: 'Courier New', monospace;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .tcp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr; gap: 6px; }
        .tcp-item {
            background: #1a1a2e; padding: 6px 4px; border-radius: 6px; text-align: center;
        }
        .tcp-item .label { font-size: 10px; color: #888; margin-bottom: 2px; }
        .tcp-item .value { font-size: 14px; font-family: 'Courier New', monospace; }
        .controller-list { list-style: none; }
        .controller-list li {
            padding: 8px 12px; margin-bottom: 6px; background: #1a1a2e;
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
        }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge.active { background: #44ff4433; color: #44ff44; }
        .badge.inactive { background: #ff444433; color: #ff4444; }
        /* R9 fix: controller-switch buttons. The currently-active motion
           controller is highlighted so the user can see which one will
           receive jog commands. */
        .btn-switch {
            padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px;
            background: #1a1a2e; color: #cfd8e3; cursor: pointer; font-size: 12px;
        }
        .btn-switch:hover { background: #0f3460; }
        .btn-switch.is-active {
            background: #44ff4433; color: #44ff44; border-color: #44ff44;
        }
        .sim-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sim-item { background: #1a1a2e; padding: 10px; border-radius: 6px; }
        .sim-item .label { font-size: 11px; color: #888; }
        .sim-item .value { font-size: 16px; font-family: 'Courier New', monospace; }
        .jog-section { margin-top: 8px; }
        .jog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .jog-row .joint-name { width: 150px; font-size: 12px; font-family: 'Courier New', monospace; }
        .jog-row input[type=range] { flex: 1; accent-color: #e94560; }
        .jog-row .joint-val { width: 65px; text-align: right; font-size: 12px; font-family: 'Courier New', monospace; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73e55; }
        .btn-primary:disabled { background: #555; cursor: not-allowed; }
        .btn-secondary { background: #0f3460; color: #e0e0e0; }
        .btn-secondary:hover { background: #1a4a80; }
        .btn-row { display: flex; gap: 8px; margin-top: 8px; }
        .log {
            background: #0d0d1a; border-radius: 6px; padding: 6px 10px;
            font-family: 'Courier New', monospace; font-size: 11px;
            max-height: 80px; overflow-y: auto;
        }
        .log-entry { padding: 2px 0; color: #888; }
        .log-entry.error { color: #ff4444; }
        .log-entry.success { color: #44ff44; }
    </style>
</head>
<body>
    <header>
        <h1>UR Robot Dashboard <span id="robot-type" style="color:#e0e0e0;font-size:16px;font-weight:400;"></span></h1>
        <div class="connection-status">
            <span id="conn-text">Disconnected</span>
            <div class="status-dot" id="conn-dot"></div>
        </div>
    </header>

    <div class="main">
        <div class="left-col">
            <!-- 3D Viewer -->
            <div class="card" id="viewer-card">
                <h2>3D View</h2>
                <div id="viewer-loading">Loading robot model...</div>
                <canvas id="viewer3d"></canvas>
            </div>
            <!-- Log -->
            <div class="card">
                <h2>Log</h2>
                <div class="log" id="log"></div>
            </div>
        </div>

        <div class="right-col">
            <!-- Joint States -->
            <div class="card">
                <h2>Joint States</h2>
                <table>
                    <thead><tr><th>Joint</th><th>Position (°)</th><th>Velocity (rad/s)</th><th>Effort (Nm)</th></tr></thead>
                    <tbody id="joint-table"></tbody>
                </table>
            </div>

            <!-- TCP Pose -->
            <div class="card">
                <h2>TCP Pose (tool0)</h2>
                <div class="tcp-grid">
                    <div class="tcp-item"><div class="label">X (m)</div><div class="value" id="tcp-x">-</div></div>
                    <div class="tcp-item"><div class="label">Y (m)</div><div class="value" id="tcp-y">-</div></div>
                    <div class="tcp-item"><div class="label">Z (m)</div><div class="value" id="tcp-z">-</div></div>
                    <div class="tcp-item"><div class="label">Roll (°)</div><div class="value" id="tcp-roll">-</div></div>
                    <div class="tcp-item"><div class="label">Pitch (°)</div><div class="value" id="tcp-pitch">-</div></div>
                    <div class="tcp-item"><div class="label">Yaw (°)</div><div class="value" id="tcp-yaw">-</div></div>
                </div>
            </div>

            <!-- Controllers + Sim -->
            <div class="card">
                <h2>Controllers <small id="control-mode-label" style="color:#888;font-weight:400"></small></h2>
                <ul class="controller-list" id="controller-list">
                    <li><span>Loading...</span></li>
                </ul>
                <!-- R9: switch the active motion controller via the
                     controller_manager/switch_controller service. The
                     JTC button is the default; the forward_* buttons
                     are useful for real-time effort demos. Buttons that
                     are incompatible with the active control_mode are
                     disabled at runtime (see wireControllerButtons). -->
                <div style="margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap;">
                    <button class="btn-switch" data-target="joint_trajectory_controller"
                            data-needs="position">→ JTC</button>
                    <button class="btn-switch" data-target="scaled_joint_trajectory_controller"
                            data-needs="position">→ scaled JTC</button>
                    <button class="btn-switch" data-target="forward_position_controller"
                            data-needs="position">→ fwd_pos</button>
                    <button class="btn-switch" data-target="forward_velocity_controller"
                            data-needs="velocity">→ fwd_vel</button>
                    <button class="btn-switch" data-target="forward_effort_controller"
                            data-needs="effort">→ fwd_eff</button>
                </div>
                <div class="sim-info" style="margin-top: 12px;">
                    <div class="sim-item"><div class="label">Sim Time</div><div class="value" id="sim-time">-</div></div>
                    <div class="sim-item"><div class="label">Status</div><div class="value" id="sim-status">-</div></div>
                </div>
            </div>

            <!-- Jog Control -->
            <div class="card">
                <h2>Joint Jog Control</h2>
                <div class="jog-section" id="jog-section"></div>
                <div class="btn-row">
                    <button class="btn btn-primary" id="send-jog" disabled>Send Trajectory</button>
                    <button class="btn btn-secondary" id="reset-jog">Reset to Current</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import URDFLoader from 'urdf-loader';

        // ============================================================
        // Configuration — fetched from server at /config.json
        // ============================================================
        let ROSBRIDGE_URL = `ws://${location.hostname}:9090`;  // fallback
        // R9 fix: the dashboard must know the active control_mode so it
        // can gate controller switch buttons. In 'position' mode only
        // position-claiming controllers can actually drive the MuJoCo
        // arm; effort controllers refuse to activate and velocity
        // controllers silently no-op. Vice versa in 'effort' mode.
        let CONTROL_MODE = 'position';
        async function loadConfig() {
            try {
                const resp = await fetch('/config.json');
                if (resp.ok) {
                    const cfg = await resp.json();
                    ROSBRIDGE_URL = cfg.rosbridge_url || `ws://${location.hostname}:${cfg.rosbridge_port}`;
                    if (cfg.control_mode) CONTROL_MODE = cfg.control_mode;
                }
            } catch(e) { /* use fallback */ }
        }
        const JOINT_NAMES = [
            'shoulder_pan_joint', 'shoulder_lift_joint', 'elbow_joint',
            'wrist_1_joint', 'wrist_2_joint', 'wrist_3_joint'
        ];
        const JOINT_LIMITS = {
            'shoulder_pan_joint': [-6.28, 6.28],
            'shoulder_lift_joint': [-6.28, 6.28],
            'elbow_joint': [-3.14, 3.14],
            'wrist_1_joint': [-6.28, 6.28],
            'wrist_2_joint': [-6.28, 6.28],
            'wrist_3_joint': [-6.28, 6.28],
        };

        let ros = null;
        let jointStates = {};
        let jogTargets = {};
        let urdfRobot = null;
        let detectedType = 'ur5e';

        // Default initial joint positions (from ur_description/config/initial_positions.yaml)
        const INITIAL_POSITIONS = {
            'shoulder_pan_joint': 0.0,
            'shoulder_lift_joint': -1.57,
            'elbow_joint': 0.0,
            'wrist_1_joint': -1.57,
            'wrist_2_joint': 0.0,
            'wrist_3_joint': 0.0,
        };

        // Initialize jointStates with default positions
        JOINT_NAMES.forEach(name => {
            jointStates[name] = {
                position: INITIAL_POSITIONS[name] ?? 0,
                velocity: 0,
                effort: 0,
            };
        });

        // ============================================================
        // Logging
        // ============================================================
        function log(msg, cls = '') {
            const el = document.getElementById('log');
            const ts = new Date().toLocaleTimeString();
            el.innerHTML += `<div class="log-entry ${cls}">[${ts}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function rad2deg(r) { return (r * 180 / Math.PI).toFixed(2); }

        function quatToEuler(q) {
            const { x, y, z, w } = q;
            const sinr = 2 * (w * x + y * z);
            const cosr = 1 - 2 * (x * x + y * y);
            const roll = Math.atan2(sinr, cosr);
            const sinp = 2 * (w * y - z * x);
            const pitch = Math.abs(sinp) >= 1 ? Math.sign(sinp) * Math.PI / 2 : Math.asin(sinp);
            const siny = 2 * (w * z + x * y);
            const cosy = 1 - 2 * (y * y + z * z);
            const yaw = Math.atan2(siny, cosy);
            return { roll, pitch, yaw };
        }

        // ============================================================
        // 3D Viewer
        // ============================================================
        let scene, camera, renderer, controls;
        let tcpAxes = null;

        function initViewer() {
            const canvas = document.getElementById('viewer3d');
            const container = document.getElementById('viewer-card');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 50);
            camera.position.set(1.5, 1.5, 1.5);
            camera.lookAt(0, 0.5, 0);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 0.5, 0);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
            controls.update();

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(3, 5, 3);
            dirLight.castShadow = true;
            scene.add(dirLight);
            const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.3);
            dirLight2.position.set(-2, 3, -1);
            scene.add(dirLight2);

            // Ground grid
            scene.add(new THREE.GridHelper(4, 20, 0x0f3460, 0x0f346066));

            // Ground shadow plane
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(4, 4),
                new THREE.ShadowMaterial({ opacity: 0.2 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Axes (ROS Z-up convention: rotate from Three.js Y-up)
            const worldAxes = new THREE.AxesHelper(0.3);
            worldAxes.rotation.x = -Math.PI / 2;
            scene.add(worldAxes);

            // Resize handling
            const ro = new ResizeObserver(() => {
                const w = container.clientWidth, h = container.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
            ro.observe(container);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function loadURDF(urType) {
            const urdfPath = `/urdf/${urType}.urdf`;

            fetch(urdfPath, { method: 'HEAD' }).then(resp => {
                if (!resp.ok) {
                    document.getElementById('viewer-loading').textContent =
                        `URDF not found for ${urType}. Run generate_urdf.sh`;
                    log(`URDF not found: ${urdfPath}`, 'error');
                    return;
                }

                const loader = new URDFLoader();
                loader.parseCollision = false;
                loader.parseVisual = true;

                loader.load(urdfPath, (robot) => {
                    if (urdfRobot) scene.remove(urdfRobot);

                    // ROS URDF uses Z-up, Three.js uses Y-up
                    robot.rotation.x = -Math.PI / 2;

                    urdfRobot = robot;

                    // Enable shadows on all meshes
                    robot.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    scene.add(robot);
                    document.getElementById('viewer-loading').style.display = 'none';

                    // Add TCP axes at tool0 frame
                    const tool0 = robot.frames?.['tool0'] || robot.joints?.['tool0-fixedjoint'];
                    if (tool0) {
                        if (tcpAxes) tcpAxes.parent?.remove(tcpAxes);
                        tcpAxes = new THREE.AxesHelper(0.1);
                        tool0.add(tcpAxes);
                    }

                    // Debug: log bounding box
                    const box = new THREE.Box3().setFromObject(robot);
                    const size = box.getSize(new THREE.Vector3());
                    log(`3D model loaded: ${urType} (size: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)})`, 'success');

                    updateRobot3D();
                }, undefined, (err) => {
                    log(`Failed to load URDF: ${err}`, 'error');
                    document.getElementById('viewer-loading').textContent = 'Failed to load model';
                });
            }).catch(err => {
                log(`Failed to fetch URDF: ${err}`, 'error');
            });
        }

        function updateRobot3D() {
            if (!urdfRobot) return;
            JOINT_NAMES.forEach(name => {
                const val = jointStates[name]?.position;
                if (val !== undefined) {
                    urdfRobot.setJointValue(name, val);
                }
            });
            updateTCPFromModel();
        }

        function updateTCPFromModel() {
            if (!urdfRobot) return;
            // R9: if the /tcp_pose_broadcaster/pose subscription has ever
            // delivered a message, skip browser FK — the broadcaster is
            // the source of truth.
            if (_tcpFromBroadcaster) return;
            // Find the tool0 frame in the URDF model
            const tool0 = urdfRobot.frames['tool0'] || urdfRobot.joints['tool0-fixedjoint'];
            if (!tool0) return;

            const worldPos = new THREE.Vector3();
            const worldQuat = new THREE.Quaternion();
            tool0.getWorldPosition(worldPos);
            tool0.getWorldQuaternion(worldQuat);

            // Convert from Three.js Y-up back to ROS Z-up for display
            // Our robot has rotation.x = -PI/2, so we undo that for the displayed values
            const rosPos = new THREE.Vector3(worldPos.x, -worldPos.z, worldPos.y);
            const undoRot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI / 2);
            const rosQuat = undoRot.multiply(worldQuat);

            document.getElementById('tcp-x').textContent = rosPos.x.toFixed(4);
            document.getElementById('tcp-y').textContent = rosPos.y.toFixed(4);
            document.getElementById('tcp-z').textContent = rosPos.z.toFixed(4);

            const euler = new THREE.Euler().setFromQuaternion(rosQuat, 'XYZ');
            document.getElementById('tcp-roll').textContent = rad2deg(euler.x);
            document.getElementById('tcp-pitch').textContent = rad2deg(euler.y);
            document.getElementById('tcp-yaw').textContent = rad2deg(euler.z);
        }

        // ============================================================
        // Jog UI
        // ============================================================
        function buildJogUI() {
            const sec = document.getElementById('jog-section');
            sec.innerHTML = '';
            JOINT_NAMES.forEach(name => {
                const [lo, hi] = JOINT_LIMITS[name];
                const cur = jointStates[name]?.position ?? 0;
                jogTargets[name] = cur;
                const row = document.createElement('div');
                row.className = 'jog-row';
                row.innerHTML = `
                    <span class="joint-name">${name}</span>
                    <input type="range" min="${lo}" max="${hi}" step="0.01" value="${cur}" id="jog-${name}">
                    <span class="joint-val" id="jogval-${name}">${rad2deg(cur)}</span>
                `;
                row.querySelector('input').addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    jogTargets[name] = val;
                    document.getElementById(`jogval-${name}`).textContent = rad2deg(val);
                });
                sec.appendChild(row);
            });
        }

        // ============================================================
        // ROS Connection
        // ============================================================
        function connect() {
            log(`Connecting to ${ROSBRIDGE_URL}...`);
            const ws = new WebSocket(ROSBRIDGE_URL);

            ws.onopen = () => {
                log('Connected to rosbridge', 'success');
                document.getElementById('conn-dot').classList.add('connected');
                document.getElementById('conn-text').textContent = 'Connected';
                document.getElementById('send-jog').disabled = false;
                ros = ws;
                subscribe();
            };

            ws.onclose = () => {
                log('Disconnected from rosbridge', 'error');
                document.getElementById('conn-dot').classList.remove('connected');
                document.getElementById('conn-text').textContent = 'Disconnected';
                document.getElementById('send-jog').disabled = true;
                ros = null;
                setTimeout(connect, 3000);
            };

            ws.onerror = () => { log('WebSocket error', 'error'); };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.op === 'publish') handleTopic(msg.topic, msg.msg);
                else if (msg.op === 'service_response') handleServiceResponse(msg);
            };
        }

        function send(obj) {
            if (ros && ros.readyState === WebSocket.OPEN) ros.send(JSON.stringify(obj));
        }

        function subscribe() {
            send({ op: 'subscribe', topic: '/joint_states', type: 'sensor_msgs/msg/JointState', throttle_rate: 100 });
            send({ op: 'subscribe', topic: '/clock', type: 'rosgraph_msgs/msg/Clock', throttle_rate: 500 });
            // R9: prefer real TCP pose from the broadcaster (matches what the
            // real UR driver publishes) instead of doing FK in the browser.
            send({ op: 'subscribe', topic: '/tcp_pose_broadcaster/pose',
                   type: 'geometry_msgs/msg/PoseStamped', throttle_rate: 50 });
            pollControllers();
            setInterval(pollControllers, 5000);
            fetchRobotType();
            buildJogUI();
        }

        // ============================================================
        // Message handlers
        // ============================================================
        function handleTopic(topic, msg) {
            if (topic === '/joint_states') updateJointStates(msg);
            else if (topic === '/clock') updateClock(msg);
            else if (topic === '/tcp_pose_broadcaster/pose') updateTCPFromBroadcaster(msg);
        }

        // R9: TCP pose subscriber. The broadcaster publishes
        // geometry_msgs/PoseStamped in the base frame; when present, we
        // use it verbatim and suppress the in-browser FK fallback.
        let _tcpFromBroadcaster = false;
        function updateTCPFromBroadcaster(msg) {
            _tcpFromBroadcaster = true;
            const p = msg.pose?.position;
            const q = msg.pose?.orientation;
            if (!p || !q) return;
            document.getElementById('tcp-x').textContent = p.x.toFixed(4);
            document.getElementById('tcp-y').textContent = p.y.toFixed(4);
            document.getElementById('tcp-z').textContent = p.z.toFixed(4);
            // quaternion -> RPY (XYZ)
            const sinr = 2*(q.w*q.x + q.y*q.z);
            const cosr = 1 - 2*(q.x*q.x + q.y*q.y);
            const roll = Math.atan2(sinr, cosr);
            const sinp = 2*(q.w*q.y - q.z*q.x);
            const pitch = Math.abs(sinp) >= 1 ? Math.sign(sinp)*Math.PI/2 : Math.asin(sinp);
            const siny = 2*(q.w*q.z + q.x*q.y);
            const cosy = 1 - 2*(q.y*q.y + q.z*q.z);
            const yaw = Math.atan2(siny, cosy);
            document.getElementById('tcp-roll').textContent = rad2deg(roll);
            document.getElementById('tcp-pitch').textContent = rad2deg(pitch);
            document.getElementById('tcp-yaw').textContent = rad2deg(yaw);
        }

        function updateJointStates(msg) {
            const tbody = document.getElementById('joint-table');
            let html = '';
            for (let i = 0; i < msg.name.length; i++) {
                const name = msg.name[i];
                jointStates[name] = {
                    position: msg.position[i],
                    velocity: msg.velocity?.[i] ?? 0,
                    effort: msg.effort?.[i] ?? 0,
                };
                html += `<tr>
                    <td>${name.replace('_joint','')}</td>
                    <td>${rad2deg(msg.position[i])}</td>
                    <td>${(msg.velocity?.[i] ?? 0).toFixed(3)}</td>
                    <td>${(msg.effort?.[i] ?? 0).toFixed(2)}</td>
                </tr>`;
            }
            tbody.innerHTML = html;
            updateRobot3D();
        }

        function updateClock(msg) {
            const sec = msg.clock.sec;
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            document.getElementById('sim-time').textContent = `${m}m ${s}s`;
            document.getElementById('sim-status').textContent = 'Running';
        }

        // ============================================================
        // Service responses
        // ============================================================
        let serviceId = 0;
        function pollControllers() {
            send({
                op: 'call_service',
                service: '/controller_manager/list_controllers',
                type: 'controller_manager_msgs/srv/ListControllers',
                args: {}, id: `ctrl_${++serviceId}`
            });
        }

        function fetchRobotType() {
            send({
                op: 'call_service',
                service: '/robot_state_publisher/get_parameters',
                type: 'rcl_interfaces/srv/GetParameters',
                args: { names: ['robot_description'] },
                id: 'get_robot_desc'
            });
        }

        function handleServiceResponse(msg) {
            if (msg.id === 'get_robot_desc') {
                try {
                    const desc = msg.values?.values?.[0]?.string_value || '';
                    const match = desc.match(/meshes\/(ur\w+)\//i);
                    if (match) {
                        detectedType = match[1].toLowerCase();
                        document.getElementById('robot-type').textContent = `— ${detectedType.toUpperCase()}`;
                        log(`Robot type: ${detectedType.toUpperCase()}`, 'success');
                        loadURDF(detectedType);
                    }
                } catch(e) { log('Could not detect robot type', 'error'); }
                return;
            }
            if (msg.id && msg.id.startsWith('ctrl_') && msg.values?.controller) {
                const list = document.getElementById('controller-list');
                list.innerHTML = '';
                // R9 fix: remember which motion controller is currently
                // active so Send Trajectory can route to the right topic
                // and so the switch buttons can highlight the live one.
                activeMotionController = null;
                msg.values.controller.forEach(c => {
                    const li = document.createElement('li');
                    const state = c.state || 'unknown';
                    const badgeCls = state === 'active' ? 'active' : 'inactive';
                    li.innerHTML = `<span>${c.name} <small style="color:#888">(${c.type})</small></span>
                                    <span class="badge ${badgeCls}">${state}</span>`;
                    list.appendChild(li);
                    if (state === 'active' && MOTION_CONTROLLERS.includes(c.name)) {
                        activeMotionController = c.name;
                    }
                });
                document.querySelectorAll('.btn-switch').forEach(b => {
                    b.classList.toggle('is-active', b.dataset.target === activeMotionController);
                });
                updateJogButtonLabel();
                return;
            }
            // R9 fix: log switch_controller responses so failures are not
            // silently swallowed.
            if (msg.id && msg.id.startsWith('switch_')) {
                const ok = msg.values?.ok ?? msg.result;
                if (ok) {
                    log('Controller switch: OK', 'success');
                    // Optimistically update so subsequent rapid clicks
                    // don't fire against a stale activeMotionController.
                    if (pendingSwitchTarget) activeMotionController = pendingSwitchTarget;
                } else {
                    log(`Controller switch FAILED: ${JSON.stringify(msg.values||msg)}`, 'error');
                }
                pendingSwitchTarget = null;
                switchInFlight = false;
                setSwitchButtonsDisabled(false);
                pollControllers();  // definitive refresh
                return;
            }
        }

        // R9: controller switcher — activate `target` and deactivate any
        // other motion controller currently active. Uses the upstream
        // controller_manager/switch_controller service.
        const MOTION_CONTROLLERS = [
            'joint_trajectory_controller',
            'scaled_joint_trajectory_controller',
            'forward_position_controller',
            'forward_velocity_controller',
            'forward_effort_controller',
        ];
        // Tracked from list_controllers polling; drives jog routing and
        // button highlighting.
        let activeMotionController = null;
        let pendingSwitchTarget = null;
        // R9 fix: prevent rapid-click double-fires. When a user clicks
        // two switch buttons quickly the 500 ms re-poll hasn't landed
        // yet, so activeMotionController is stale and the second
        // switch_controller call tries to deactivate the wrong thing.
        // We disable all switch buttons while a request is in flight
        // and re-enable them once the response lands.
        let switchInFlight = false;
        function setSwitchButtonsDisabled(dis) {
            document.querySelectorAll('.btn-switch').forEach(b => {
                if (b.dataset.gatedOff === '1') return; // control_mode gated
                b.disabled = dis;
                b.style.opacity = dis ? '0.6' : '';
            });
        }
        function switchController(target) {
            if (switchInFlight) {
                log(`Ignoring click on ${target}: previous switch still in flight`, 'error');
                return;
            }
            if (activeMotionController === target) {
                log(`${target} is already active`, 'success');
                return;
            }
            const currentActive = activeMotionController && activeMotionController !== target
                ? [activeMotionController] : [];
            // R9 fix: seed forward_* command topics with the current
            // joint state before activating, otherwise the controller
            // activates with an uninitialized / zero command and the
            // robot snaps (visible as wrist_3 spinning in MuJoCo).
            const currentPositions = JOINT_NAMES.map(n => jointStates[n]?.position ?? 0);
            if (target === 'forward_position_controller') {
                send({op:'publish', topic:'/forward_position_controller/commands',
                      type:'std_msgs/msg/Float64MultiArray',
                      msg:{layout:{dim:[],data_offset:0}, data: currentPositions}});
            } else if (target === 'forward_velocity_controller') {
                send({op:'publish', topic:'/forward_velocity_controller/commands',
                      type:'std_msgs/msg/Float64MultiArray',
                      msg:{layout:{dim:[],data_offset:0}, data: currentPositions.map(()=>0)}});
            } else if (target === 'forward_effort_controller') {
                // Zero-effort pre-seed; the gravity_compensation node will
                // publish its own real commands at 500 Hz anyway.
                send({op:'publish', topic:'/forward_effort_controller/commands',
                      type:'std_msgs/msg/Float64MultiArray',
                      msg:{layout:{dim:[],data_offset:0}, data: currentPositions.map(()=>0)}});
            }
            log(`Switching controllers: activate=${target}, deactivate=${currentActive.join(',') || '(none)'}`);
            switchInFlight = true;
            setSwitchButtonsDisabled(true);
            pendingSwitchTarget = target;
            send({
                op: 'call_service',
                service: '/controller_manager/switch_controller',
                type: 'controller_manager_msgs/srv/SwitchController',
                args: {
                    activate_controllers: [target],
                    deactivate_controllers: currentActive,
                    strictness: 2, // STRICT: fail loudly if a switch cannot be done
                    activate_asap: true,
                    timeout: { sec: 5, nanosec: 0 },
                },
                id: `switch_${++serviceId}`,
            });
            // Refresh list sooner than the 5s poll to reflect the change.
            setTimeout(pollControllers, 500);
        }
        document.querySelectorAll('.btn-switch').forEach(b => {
            b.addEventListener('click', () => switchController(b.dataset.target));
        });
        // R9 fix: disable buttons whose command interface isn't
        // actuated in the current control_mode. In position mode only
        // controllers claiming `position` actually drive the arm; in
        // effort mode only `effort` does. `velocity` is not actuated in
        // either mode (Gazebo/MuJoCo pick one actuator type per joint).
        function wireControllerButtons() {
            const allowed = CONTROL_MODE === 'effort' ? new Set(['effort'])
                                                      : new Set(['position']);
            document.querySelectorAll('.btn-switch').forEach(b => {
                const needs = b.dataset.needs;
                if (!allowed.has(needs)) {
                    b.disabled = true;
                    b.dataset.gatedOff = '1';
                    b.title = `Unavailable in control_mode=${CONTROL_MODE} ` +
                              `(requires '${needs}' actuator)`;
                    b.style.opacity = '0.4';
                    b.style.cursor = 'not-allowed';
                }
            });
            const lbl = document.getElementById('control-mode-label');
            if (lbl) lbl.textContent = `— control_mode=${CONTROL_MODE}`;
        }

        // ============================================================
        // Jog controls
        // ============================================================
        // R9 fix: the jog button must target whichever motion controller
        // is currently active, not a hardcoded JTC topic. Otherwise
        // switching to forward_position_controller appears to 'break'
        // the dashboard — the JTC topic has no subscriber.
        function updateJogButtonLabel() {
            const btn = document.getElementById('send-jog');
            if (!btn) return;
            const ctrl = activeMotionController || 'joint_trajectory_controller';
            const short = ctrl === 'joint_trajectory_controller' ? 'JTC'
                         : ctrl === 'scaled_joint_trajectory_controller' ? 'scaled JTC'
                         : ctrl === 'forward_position_controller' ? 'fwd_pos'
                         : ctrl === 'forward_velocity_controller' ? 'fwd_vel'
                         : ctrl === 'forward_effort_controller' ? 'fwd_eff'
                         : ctrl;
            btn.textContent = `Send → ${short}`;
        }
        document.getElementById('send-jog').addEventListener('click', () => {
            const positions = JOINT_NAMES.map(n => jogTargets[n]);
            const ctrl = activeMotionController || 'joint_trajectory_controller';
            if (ctrl === 'joint_trajectory_controller' || ctrl === 'scaled_joint_trajectory_controller') {
                log(`Sending trajectory via ${ctrl}: [${positions.map(p => rad2deg(p)).join(', ')}]°`);
                sendJtcTrajectory(ctrl, positions);
            } else if (ctrl === 'forward_position_controller') {
                log(`Sending positions via forward_position_controller: [${positions.map(p => rad2deg(p)).join(', ')}]°`);
                send({
                    op: 'publish',
                    topic: '/forward_position_controller/commands',
                    type: 'std_msgs/msg/Float64MultiArray',
                    msg: { layout: { dim: [], data_offset: 0 }, data: positions },
                });
            } else {
                log(`Jog not supported for active controller '${ctrl}' — switch to JTC/fwd_pos first`, 'error');
            }
        });
        function sendJtcTrajectory(ctrl, positions) {
            send({
                op: 'publish',
                topic: `/${ctrl}/joint_trajectory`,
                type: 'trajectory_msgs/msg/JointTrajectory',
                msg: {
                    header: { stamp: { sec: 0, nanosec: 0 }, frame_id: '' },
                    joint_names: JOINT_NAMES,
                    points: [{
                        positions, velocities: [], accelerations: [], effort: [],
                        time_from_start: { sec: 3, nanosec: 0 }
                    }]
                }
            });
            log('Trajectory sent', 'success');
        }

        document.getElementById('reset-jog').addEventListener('click', () => {
            JOINT_NAMES.forEach(name => {
                const cur = jointStates[name]?.position ?? 0;
                jogTargets[name] = cur;
                const slider = document.getElementById(`jog-${name}`);
                if (slider) slider.value = cur;
                const valEl = document.getElementById(`jogval-${name}`);
                if (valEl) valEl.textContent = rad2deg(cur);
            });
            log('Jog targets reset to current positions');
        });

        // ============================================================
        // Init
        // ============================================================
        initViewer();
        buildJogUI();
        // Populate initial joint table
        const tbody = document.getElementById('joint-table');
        tbody.innerHTML = JOINT_NAMES.map(name => {
            const js = jointStates[name];
            return `<tr><td>${name}</td><td>${rad2deg(js.position)}</td><td>0.0000</td><td>0.0000</td></tr>`;
        }).join('');
        loadURDF(detectedType);
        loadConfig().then(() => { wireControllerButtons(); connect(); });
    </script>
</body>
</html>
